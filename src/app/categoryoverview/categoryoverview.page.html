<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/domains/tabs/cartlist"></ion-back-button>
    </ion-buttons>
    <ion-title>{{ 'categories.title' | translate}}</ion-title>
    <ion-buttons slot="primary">
      <ion-button (click)="onCreateCategory()">
        <ion-icon name="add" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-refresher slot="fixed" (ionRefresh)="refreshCategories($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>
  <ion-grid class="ion-padding">
    <ion-row>
      <ion-col class="ion-text-center" size-md="6" offset-md="3" *ngIf="isLoading">
        <ion-spinner color="primary"></ion-spinner>
      </ion-col>
      <ion-col class="ion-text-center" size-md="6" offset-md="3" *ngIf="!isLoading && (!categories() || categories().length === 0)">
        <p>{{ 'categories.empty' | translate }}</p>
      </ion-col>
    </ion-row>
    <ion-row>
      <ion-col>
        <ion-list *ngIf="!isLoading && categories().length > 0">
          <ion-list-header>
            <div class="category-header">
              <ion-text color="medium">{{ 'categories.header' | translate }} {{ activeGroup().name }}</ion-text>
              <ion-label>{{ 'categories.subheader' | translate }} ({{ categories().length }})</ion-label>
            </div>
          </ion-list-header>

          <div *ngFor="let cat of categories(), let i = index">
            <ion-item [lines]="i == categories().length - 1 ? 'none' : 'inset'">
              <ion-avatar slot="start">
                <div class="category-circle">
                  <p *ngIf="!isSettlementpayment(cat.name)">{{ cat.name.substring(0, 2) | uppercase }}</p>
                  <ion-icon *ngIf="isSettlementpayment(cat.name)" name="swap-horizontal-outline" color="medium"></ion-icon>
                </div>
              </ion-avatar>
              <ion-label (click)="onUpdateCategory(cat)">
                <p class="ion-text-wrap">{{ cat.name }}</p>
              </ion-label>
              <ion-buttons>
                <ion-button (click)="onDeleteCategory(cat)">
                  <ion-icon name="close-outline" slot="icon-only" size="small"></ion-icon>
                </ion-button>
              </ion-buttons>
            </ion-item>
          </div>

        </ion-list>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
